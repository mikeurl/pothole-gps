<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pothole GPS">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Pothole GPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; padding-top: env(safe-area-inset-top, 20px);
    }

    h1 { font-size: 1.4rem; margin-bottom: 12px; color: #e94560; letter-spacing: 1px; }

    .subtitle {
      font-size: 0.8rem; color: #888; margin-bottom: 16px; text-align: center;
    }

    #captureBtn {
      width: 170px; height: 170px; border-radius: 50%;
      border: 4px solid #e94560;
      background: radial-gradient(circle at 40% 40%, #e94560, #c0392b);
      color: white; font-size: 1.2rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; text-align: center;
      box-shadow: 0 0 30px rgba(233,69,96,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none; margin: 16px 0; line-height: 1.3;
    }
    #captureBtn:active { transform: scale(0.93); box-shadow: 0 0 15px rgba(233,69,96,0.6); }
    #captureBtn.capturing {
      background: radial-gradient(circle at 40% 40%, #f39c12, #e67e22);
      border-color: #f39c12; box-shadow: 0 0 30px rgba(243,156,18,0.5);
    }
    #captureBtn.success {
      background: radial-gradient(circle at 40% 40%, #27ae60, #1e8449);
      border-color: #27ae60; box-shadow: 0 0 30px rgba(39,174,96,0.5);
    }
    #captureBtn.photo-ready {
      background: radial-gradient(circle at 40% 40%, #3498db, #2980b9);
      border-color: #3498db; box-shadow: 0 0 30px rgba(52,152,219,0.5);
    }

    #status { font-size: 0.9rem; color: #aaa; margin-bottom: 12px; text-align: center; }

    #cameraInput { display: none; }

    #history { width: 100%; max-width: 400px; flex: 1; overflow-y: auto; }

    .entry {
      background: #16213e; border-radius: 12px; padding: 14px;
      margin-bottom: 10px; border-left: 4px solid #e94560;
      position: relative;
    }
    .entry.submitted { border-left-color: #27ae60; }
    .entry-header {
      display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px;
    }
    .entry-thumb {
      width: 60px; height: 60px; border-radius: 8px; object-fit: cover;
      background: #0f3460; flex-shrink: 0; cursor: pointer;
    }
    .entry-thumb-placeholder {
      width: 60px; height: 60px; border-radius: 8px;
      background: #0f3460; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #555; text-align: center;
    }
    .entry-info { flex: 1; min-width: 0; }
    .entry-time { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    .entry-coords {
      font-size: 0.95rem; font-family: 'SF Mono','Menlo',monospace;
      color: #eee; word-break: break-all;
    }
    .entry-submitted-badge {
      font-size: 0.7rem; color: #27ae60; margin-top: 4px; font-weight: 600;
    }

    .entry-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .entry-actions button {
      flex: 1; padding: 8px 4px; border: none; border-radius: 8px;
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent; min-width: 0;
    }
    .btn-copy { background: #2c3e6d; color: #eee; }
    .btn-map { background: #1a6b3c; color: #eee; }
    .btn-submit { background: #8e44ad; color: #eee; }
    .btn-delete { background: #7f1d1d; color: #eee; }
    .btn-copy:active, .btn-map:active, .btn-submit:active, .btn-delete:active { opacity: 0.7; }

    #count { font-size: 0.8rem; color: #666; margin-top: 12px; text-align: center; }

    .empty-state {
      text-align: center; color: #555; margin-top: 40px;
      font-size: 0.95rem; line-height: 1.6;
    }

    /* Full-screen photo viewer */
    #photoViewer {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); z-index: 1000;
      align-items: center; justify-content: center; flex-direction: column;
    }
    #photoViewer.active { display: flex; }
    #photoViewer img {
      max-width: 95%; max-height: 80%; border-radius: 8px; object-fit: contain;
    }
    #photoViewer .close-btn {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: white;
      font-size: 2rem; cursor: pointer; padding: 10px;
    }

    /* Delete confirmation */
    #confirmOverlay {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 1001;
      align-items: center; justify-content: center;
    }
    #confirmOverlay.active { display: flex; }
    .confirm-box {
      background: #16213e; border-radius: 16px; padding: 24px; text-align: center;
      max-width: 300px; width: 90%;
    }
    .confirm-box p { margin-bottom: 16px; font-size: 0.95rem; line-height: 1.4; }
    .confirm-box .confirm-actions { display: flex; gap: 10px; }
    .confirm-box button {
      flex: 1; padding: 12px; border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .confirm-cancel { background: #2c3e6d; color: #eee; }
    .confirm-delete { background: #c0392b; color: #fff; }
  </style>
</head>
<body>
  <h1>POTHOLE GPS</h1>
  <div class="subtitle">Tap to capture location, then optionally add a photo</div>

  <button id="captureBtn" onclick="handleButtonTap()">TAP TO<br>CAPTURE</button>
  <input type="file" id="cameraInput" accept="image/*" capture="environment">

  <div id="status">Ready</div>

  <div id="history"></div>
  <div id="count"></div>

  <!-- Full-screen photo viewer -->
  <div id="photoViewer" onclick="closePhoto()">
    <button class="close-btn" onclick="closePhoto()">&times;</button>
    <img id="photoViewerImg" src="" alt="Pothole photo">
  </div>

  <!-- Delete confirmation dialog -->
  <div id="confirmOverlay">
    <div class="confirm-box">
      <p id="confirmMsg">Delete this capture?</p>
      <div class="confirm-actions">
        <button class="confirm-cancel" onclick="cancelDelete()">Cancel</button>
        <button class="confirm-delete" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    var STORAGE_KEY = 'pothole_captures';
    var PHOTO_PREFIX = 'pothole_photo_';
    var SURVEY_URL = 'https://survey123.arcgis.com/share/0703109c15504586b377cfb78f61fd2b';
    var captures = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    var lastSavedId = null;
    var photoMode = false;
    var photoTimer = null;
    var pendingDeleteIndex = -1;

    function render() {
      var hist = document.getElementById('history');
      var countEl = document.getElementById('count');

      if (captures.length === 0) {
        hist.innerHTML = '<div class="empty-state">No captures yet.<br>Tap the button to grab your<br>GPS location.</div>';
        countEl.textContent = '';
        return;
      }

      hist.innerHTML = captures.map(function(c, i) {
        var photoData = localStorage.getItem(PHOTO_PREFIX + c.id);
        var thumbHtml = photoData
          ? '<img class="entry-thumb" src="' + photoData + '" onclick="viewPhoto(\'' + c.id + '\')" alt="Photo">'
          : '<div class="entry-thumb-placeholder">No<br>photo</div>';

        var submittedBadge = c.submitted
          ? '<div class="entry-submitted-badge">Submitted</div>'
          : '';

        var entryClass = c.submitted ? 'entry submitted' : 'entry';

        return '<div class="' + entryClass + '">' +
          '<div class="entry-header">' +
            thumbHtml +
            '<div class="entry-info">' +
              '<div class="entry-time">' + c.time + '</div>' +
              '<div class="entry-coords">' + c.lat.toFixed(6) + ', ' + c.lng.toFixed(6) + '</div>' +
              submittedBadge +
            '</div>' +
          '</div>' +
          '<div class="entry-actions">' +
            '<button class="btn-submit" onclick="submitToSurvey(' + i + ')">Submit</button>' +
            '<button class="btn-copy" onclick="copyCoords(' + i + ')">Copy</button>' +
            '<button class="btn-map" onclick="openMap(' + i + ')">Map</button>' +
            '<button class="btn-delete" onclick="askDelete(' + i + ')">Del</button>' +
          '</div>' +
        '</div>';
      }).join('');

      countEl.textContent = captures.length + ' capture' + (captures.length !== 1 ? 's' : '') + ' saved';
    }

    // Single button handler
    function handleButtonTap() {
      if (photoMode) {
        document.getElementById('cameraInput').click();
        return;
      }
      captureGPS();
    }

    function captureGPS() {
      var btn = document.getElementById('captureBtn');
      var status = document.getElementById('status');

      if (!navigator.geolocation) {
        status.textContent = 'GPS not supported on this device';
        return;
      }

      btn.className = 'capturing';
      btn.innerHTML = 'GETTING<br>LOCATION...';
      status.textContent = 'Acquiring GPS...';

      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var entry = {
            id: Date.now().toString(36),
            lat: pos.coords.latitude,
            lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy,
            time: new Date().toLocaleString(),
            hasPhoto: false,
            submitted: false
          };

          captures.unshift(entry);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(captures));
          lastSavedId = entry.id;

          if (navigator.vibrate) navigator.vibrate(100);

          btn.className = 'success';
          btn.innerHTML = 'SAVED!';
          status.textContent = entry.lat.toFixed(6) + ', ' + entry.lng.toFixed(6) + ' (\u00b1' + Math.round(entry.accuracy) + 'm)';

          render();

          setTimeout(function() {
            enterPhotoMode();
          }, 800);
        },
        function(err) {
          btn.className = '';
          btn.innerHTML = 'TAP TO<br>CAPTURE';
          status.textContent = 'Error: ' + err.message;
        },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function enterPhotoMode() {
      var btn = document.getElementById('captureBtn');
      photoMode = true;
      btn.className = 'photo-ready';
      btn.innerHTML = 'ADD<br>PHOTO';
      document.getElementById('status').textContent = 'Tap to add a photo, or wait to skip';

      if (photoTimer) clearTimeout(photoTimer);
      photoTimer = setTimeout(function() {
        exitPhotoMode();
      }, 8000);
    }

    function exitPhotoMode() {
      var btn = document.getElementById('captureBtn');
      photoMode = false;
      lastSavedId = null;
      btn.className = '';
      btn.innerHTML = 'TAP TO<br>CAPTURE';
      document.getEmementById('status').textContent = 'Ready';
      if (photoTimer) { clearTimeout(photoTimer); photoTimer = null; }
    }

    // Handle photo from camera
    document.getElementById('cameraInput').addEventListener('change', function() {
      var input = this;
      if (input.files && input.files[0] && lastSavedId) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            var maxSize = 800;
            var w = img.width, h = img.height;
            if (w > h) { if (w > maxSize) { h = h * maxSize / w; w = maxSize; } }
            else { if (h > maxSize) { w = w * maxSize / h; h = maxSize; } }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            var compressed = canvas.toDataURL('image/jpeg', 0.6);

            try {
              localStorage.setItem(PHOTO_PREFIX + lastSavedId, compressed);
              for (var i = 0; i < captures.length; i++) {
                if (captures[i].id === lastSavedId) {
                  captures[i].hasPhoto = true;
                  break;
                }
              }
              localStorage.setItem(STORAGE_KEY, JSON.stringify(captures));
              document.getElementById('status').textContent = 'Photo added!';
            } catch (e) {
              document.getElementById('status').textContent = 'Storage full, photo not saved';
            }

            render();
            exitPhotoMode();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      } else {
        exitPhotoMode();
      }

      input.value = '';
    });

    // Submit to Survey123 with GPS pre-filled
    function submitToSurvey(i) {
      var c = captures[i];
      var url = SURVEY_URL + '?center=' + c.lat + ',' + c.lng;
      window.open(url, '_blank');

      // Mark as submitted
      captures[i].submitted = true;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(captures));
      render();
    }

    function copyCoords(i) {
      var c = captures[i];
      var text = c.lat.toFixed(6) + ', ' + c.lng.toFixed(6);
      navigator.clipboard.writeText(text).then(function() {
        event.target.textContent = 'Copied!';
        setTimeout(function() { event.target.textContent = 'Copy'; }, 1200);
      });
    }

    function openMap(i) {
      var c = captures[i];
      window.open('https://maps.apple.com/?ll=' + c.lat + ',' + c.lng + '&q=Pothole', '_blank');
    }

    function viewPhoto(id) {
      event.stopPropagation();
      var data = localStorage.getItem(PHOTO_PREFIX + id);
      if (data) {
        document.getElementById('photoViewerImg').src = data;
        document.getElementById('photoViewer').classList.add('active');
      }
    }

    function closePhoto() {
      document.getElementById('photoViewer').classList.remove('active');
    }

    // Delete with confirmation
    function askDelete(i) {
      pendingDeleteIndex = i;
      var c = captures[i];
      document.getElementById('confirmMsg').textContent = 'Delete capture at ' + c.lat.toFixed(4) + ', ' + c.lng.toFixed(4) + '?';
      document.getElementById('confirmOverlay').classList.add('active');
    }

    function cancelDelete() {
      pendingDeleteIndex = -1;
      document.getElementById('confirmOverlay').classList.remove('active');
    }

    function confirmDelete() {
      if (pendingDeleteIndex >= 0 && pendingDeleteIndex < captures.length) {
        var removed = captures.splice(pendingDeleteIndex, 1)[0];
        // Remove photo too
        localStorage.removeItem(PHOTO_PREFIX + removed.id);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(captures));
        render();
      }
      pendingDeleteIndex = -1;
      document.getElementById('confirmOverlay').classList.remove('active');
    }

    render();
  </script>
</body>
</html>
