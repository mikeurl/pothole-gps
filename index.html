<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pothole GPS">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Pothole GPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e; color: #eee; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; padding-top: env(safe-area-inset-top, 20px);
    }

    h1 { font-size: 1.4rem; margin-bottom: 12px; color: #e94560; letter-spacing: 1px; }

    #captureBtn {
      width: 170px; height: 170px; border-radius: 50%;
      border: 4px solid #e94560;
      background: radial-gradient(circle at 40% 40%, #e94560, #c0392b);
      color: white; font-size: 1.2rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; text-align: center;
      box-shadow: 0 0 30px rgba(233,69,96,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
      -webkit-tap-highlight-color: transparent; user-select: none; margin: 16px 0; line-height: 1.3;
    }
    #captureBtn:active { transform: scale(0.93); box-shadow: 0 0 15px rgba(233,69,96,0.6); }
    #captureBtn.capturing {
      background: radial-gradient(circle at 40% 40%, #f39c12, #e67e22);
      border-color: #f39c12; box-shadow: 0 0 30px rgba(243,156,18,0.5);
    }
    #captureBtn.success {
      background: radial-gradient(circle at 40% 40%, #27ae60, #1e8449);
      border-color: #27ae60; box-shadow: 0 0 30px rgba(39,174,96,0.5);
    }

    #status { font-size: 0.9rem; color: #aaa; margin-bottom: 12px; text-align: center; }

    #cameraInput { display: none; }

    #history { width: 100%; max-width: 400px; flex: 1; overflow-y: auto; }

    .entry {
      background: #16213e; border-radius: 12px; padding: 14px;
      margin-bottom: 10px; border-left: 4px solid #e94560;
    }
    .entry-header {
      display: flex; gap: 10px; align-items: flex-start; margin-bottom: 8px;
    }
    .entry-thumb {
      width: 60px; height: 60px; border-radius: 8px; object-fit: cover;
      background: #0f3460; flex-shrink: 0; cursor: pointer;
    }
    .entry-thumb-placeholder {
      width: 60px; height: 60px; border-radius: 8px;
      background: #0f3460; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: #555; text-align: center;
    }
    .entry-info { flex: 1; min-width: 0; }
    .entry-time { font-size: 0.8rem; color: #888; margin-bottom: 4px; }
    .entry-coords {
      font-size: 0.95rem; font-family: 'SF Mono','Menlo',monospace;
      color: #eee; word-break: break-all;
    }
    .entry-actions { display: flex; gap: 8px; }
    .entry-actions button {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-copy { background: #2c3e6d; color: #eee; }
    .btn-map { background: #1a6b3c; color: #eee; }
    .btn-copy:active, .btn-map:active { opacity: 0.7; }

    #count { font-size: 0.8rem; color: #666; margin-top: 12px; text-align: center; }

    .empty-state {
      text-align: center; color: #555; margin-top: 40px;
      font-size: 0.95rem; line-height: 1.6;
    }

    #photoViewer {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92); z-index: 1000;
      align-items: center; justify-content: center; flex-direction: column;
    }
    #photoViewer.active { display: flex; }
    #photoViewer img {
      max-width: 95%; max-height: 80%; border-radius: 8px; object-fit: contain;
    }
    #photoViewer .close-btn {
      position: absolute; top: 20px; right: 20px;
      background: none; border: none; color: white;
      font-size: 2rem; cursor: pointer; padding: 10px;
    }

    .subtitle {
      font-size: 0.8rem; color: #888; margin-bottom: 16px; text-align: center;
    }
  </style>
</head>
<body>
  <h1>POTHOLE GPS</h1>
  <div class="subtitle">Tap to capture location + photo</div>

  <button id="captureBtn" onclick="capture()">TAP TO<br>CAPTURE</button>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" onchange="handlePhoto(this)">

  <div id="status">Ready</div>

  <div id="history"></div>
  <div id="count"></div>

  <div id="photoViewer" onclick="closePhoto()">
    <button class="close-btn" onclick="closePhoto()">&times;</button>
    <img id="photoViewerImg" src="" alt="Pothole photo">
  </div>

  <script>
    const STORAGE_KEY = 'pothole_captures';
    const PHOTO_PREFIX = 'pothole_photo_';
    let captures = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let pendingEntry = null;

    function render() {
      const hist = document.getElementById('history');
      const countEl = document.getElementById('count');
      if (captures.length === 0) {
        hist.innerHTML = '<div class="empty-state">No captures yet.<br>Tap the button to grab your<br>GPS location + photo.</div>';
        countEl.textContent = '';
        return;
      }
      hist.innerHTML = captures.map((c, i) => {
        const photoData = localStorage.getItem(PHOTO_PREFIX + c.id);
        const thumbHtml = photoData
          ? '<img class="entry-thumb" src="' + photoData + '" onclick="viewPhoto(\'' + c.id + '\')" alt="Photo">'
          : '<div class="entry-thumb-placeholder">No<br>photo</div>';
        return '<div class="entry"><div class="entry-header">' + thumbHtml +
          '<div class="entry-info"><div class="entry-time">' + c.time + '</div>' +
          '<div class="entry-coords">' + c.lat.toFixed(6) + ', ' + c.lng.toFixed(6) + '</div></div></div>' +
          '<div class="entry-actions"><button class="btn-copy" onclick="copyCoords(' + i + ')">Copy</button>' +
          '<button class="btn-map" onclick="openMap(' + i + ')">Map</button></div></div>';
      }).join('');
      countEl.textContent = captures.length + ' capture' + (captures.length !== 1 ? 's' : '') + ' saved';
    }

    function capture() {
      const btn = document.getElementById('captureBtn');
      const status = document.getElementById('status');
      if (!navigator.geolocation) { status.textContent = 'GPS not supported on this device'; return; }
      btn.className = 'capturing';
      btn.innerHTML = 'GETTING<br>LOCATION...';
      status.textContent = 'Acquiring GPS...';
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const entry = {
            id: Date.now().toString(36), lat: pos.coords.latitude, lng: pos.coords.longitude,
            accuracy: pos.coords.accuracy, time: new Date().toLocaleString(), hasPhoto: false
          };
          pendingEntry = entry;
          btn.className = 'success';
          btn.innerHTML = 'GOT IT!';
          status.textContent = entry.lat.toFixed(6) + ', ' + entry.lng.toFixed(6) + ' (\u00b1' + Math.round(entry.accuracy) + 'm)';
          if (navigator.vibrate) navigator.vibrate(100);
          document.getElementById('cameraInput').click();
          setTimeout(() => { if (pendingEntry) savePendingEntry(); }, 60000);
        },
        (err) => { btn.className = ''; btn.innerHTML = 'TAP TO<br>CAPTURE'; status.textContent = 'Error: ' + err.message; },
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
      );
    }

    function handlePhoto(input) {
      if (input.files && input.files[0] && pendingEntry) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = new Image();
          img.onload = function() {
            const canvas = document.createElement('canvas');
            const maxSize = 800;
            let w = img.width, h = img.height;
            if (w > h) { if (w > maxSize) { h = h * maxSize / w; w = maxSize; } }
            else { if (h > maxSize) { w = w * maxSize / h; h = maxSize; } }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const compressed = canvas.toDataURL('image/jpeg', 0.6);
            try { localStorage.setItem(PHOTO_PREFIX + pendingEntry.id, compressed); pendingEntry.hasPhoto = true; }
            catch (e) { console.log('Storage full, saving without photo'); }
            savePendingEntry();
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
      } else {
        if (pendingEntry) savePendingEntry();
      }
      input.value = '';
    }

    function savePendingEntry() {
      if (!pendingEntry) return;
      captures.unshift(pendingEntry);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(captures));
      pendingEntry = null;
      render();
      setTimeout(() => { document.getElementById('captureBtn').className = ''; document.getElementById('captureBtn').innerHTML = 'TAP TO<br>CAPTURE'; }, 1000);
    }

    function copyCoords(i) {
      const c = captures[i];
      navigator.clipboard.writeText(c.lat.toFixed(6) + ', ' + c.lng.toFixed(6)).then(() => {
        event.target.textContent = 'Copied!';
        setTimeout(() => { event.target.textContent = 'Copy'; }, 1200);
      });
    }

    function openMap(i) {
      const c = captures[i];
      window.open('https://maps.apple.com/?ll=' + c.lat + ',' + c.lng + '&q=Pothole', '_blank');
    }

    function viewPhoto(id) {
      event.stopPropagation();
      const data = localStorage.getItem(PHOTO_PREFIX + id);
      if (data) {
        document.getElementById('photoViewerImg').src = data;
        document.getElementById('photoViewer').classList.add('active');
      }
    }

    function closePhoto() {
      document.getElementById('photoViewer').classList.remove('active');
    }

    document.getElementById('cameraInput').addEventListener('cancel', function() {
      if (pendingEntry) savePendingEntry();
    });

    render();
  </script>
</body>
</html>
